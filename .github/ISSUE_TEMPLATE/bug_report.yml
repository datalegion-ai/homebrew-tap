name: Bug Report
description: Report a bug with the Homebrew formula or CLI installation
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Commands you ran and their output.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include any error messages.
    validations:
      required: true
  - type: input
    id: cli-version
    attributes:
      label: CLI Version
      description: Output of `datalegion-cli version`
    validations:
      required: true
  - type: input
    id: brew-version
    attributes:
      label: Homebrew Version
      description: Output of `brew --version`
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g. macOS 15.3, Ubuntu 24.04
    validations:
      required: true
